# start session index from 1
set -g base-index 1
set -g renumber-windows on
set -sg escape-time 0

# new session and switch immediately
bind -n M-t new-session \; switch-client -t :


# switch sessions (Alt+1 = session 0)
bind -n M-1 switch-client -t 0
bind -n M-2 switch-client -t 1
bind -n M-3 switch-client -t 2
bind -n M-4 switch-client -t 3
bind -n M-5 switch-client -t 4
bind -n M-6 switch-client -t 5
bind -n M-7 switch-client -t 6
bind -n M-8 switch-client -t 7
bind -n M-9 switch-client -t 8

# kill current session
bind -n M-q kill-session

# kill tmux server (all sessions)
bind -n C-M-q kill-server

# reload config
bind r source-file ~/.tmux.conf
